[tox]
envlist =
    check
    lint
    py{310,311,312}-django4.2
    py{310,311,312,313,314}-django5.2
    coverage
no_package = true

[testenv]
deps =
    -rrequirements/testing.txt
    django4.2: Django>=4.2,<5.0
    django5.2: Django>=5.2,<6.0
    django4.2: psycopg<3.4
    django5.2: psycopg<3.4
allowlist_externals = make
commands = make test
package = editable

[testenv:check]
basepython = python3.14
commands = make check

[testenv:lint]
basepython = python3.14
commands = make lint

[testenv:coverage]
depends = *django*
basepython = python3.14
commands = make coverage-report
